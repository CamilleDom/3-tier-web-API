name: CI devops 2026
on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch: # Permet de déclencher manuellement le déploiement

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend: 
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('Backend_API/simpleapi/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and test with Maven
        run: cd Backend_API/simpleapi && mvn clean verify --file pom.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: Backend_API/simpleapi/target/surefire-reports/
          retention-days: 30

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend_API/simpleapi/target/*.jar
          retention-days: 7

      - name: ❌ Erreur - Tests Maven échoués
        if: failure()
        run: echo "Problème dans le step 'Build and test with Maven' - Vérifiez les logs et artifacts"

  sonar-quality-gate:
    needs: test-backend
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('Backend_API/simpleapi/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd Backend_API/simpleapi
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=CamilleDom_3-tier-web-API \
            -Dsonar.organization=camilledom \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            --file pom.xml

      - name: ✓ Quality Gate PASSED
        if: success()
        run: echo "SonarCloud Quality Gate réussi! Pas de nouvelles erreurs détectées."

      - name: ❌ Quality Gate FAILED
        if: failure()
        run: |
          echo "❌ SonarCloud Quality Gate échoué!"
          echo "Possibilités:"
          echo "  - Des bugs ont été ajoutés"
          echo "  - La couverture de tests a baissé"
          echo "  - Des vulnérabilités détectées"
          echo "  - Code duplications excessives"
          echo ""
          echo "Consulte le rapport SonarCloud: https://sonarcloud.io/project/overview?id=CamilleDom_3-tier-web-API"
          exit 1

  test-database:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ${{ secrets.DB_USER }}; then
              echo "Database is ready!"
              break
            fi
            echo "Waiting for database... ($i/30)"
            sleep 1
          done

      - name: Create schema and insert test data
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -f Database/sql/01-CreateScheme.sql
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -f Database/sql/02-InsertData.sql

      - name: Verify database structure
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Vérification des tables créées..."
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -c "\dt public.*"
          
          echo "Vérification des données..."
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -c "SELECT COUNT(*) as nb_departments FROM public.departments;"
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -c "SELECT COUNT(*) as nb_students FROM public.students;"

      - name: ❌ Erreur - Tests database échoués
        if: failure()
        run: echo "Problème dans les tests database - Schéma ou données invalides"

  integration-tests:
    needs: [test-backend, test-database]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('Backend_API/simpleapi/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ${{ secrets.DB_USER }}; then
              echo "Database is ready!"
              break
            fi
            echo "Waiting for database... ($i/30)"
            sleep 1
          done
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Setup database for integration tests
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -f Database/sql/01-CreateScheme.sql
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -f Database/sql/02-InsertData.sql

      - name: Run integration tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cd Backend_API/simpleapi
          mvn verify -Dtest=*IntegrationTest || echo "Note: Integration tests may not be configured yet"

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: Backend_API/simpleapi/target/surefire-reports/
          retention-days: 30

      - name: ❌ Erreur - Integration tests échoués
        if: failure()
        run: echo "Problème dans les integration tests - Backend ne peut pas se connecter à la DB"

  build-backend-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-backend, test-database, integration-tests, sonar-quality-gate]
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tags
        id: tags
        run: |
          BRANCH=$(echo ${{ github.ref }} | sed 's|refs/heads/||')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version_tag=$BRANCH-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Version: $BRANCH-$SHORT_SHA"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend API
        uses: docker/build-push-action@v6
        with:
          context: ./Backend_API/simpleapi
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USER }}/td1-backend:latest
            ${{ secrets.DOCKER_USER }}/td1-backend:${{ steps.tags.outputs.version_tag }}

      - name: ❌ Erreur - Build backend échoué
        if: failure()
        run: echo "Problème dans le step 'Build and push backend API'" && exit 1

  build-database-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    needs: [test-database, sonar-quality-gate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tags
        id: tags
        run: |
          BRANCH=$(echo ${{ github.ref }} | sed 's|refs/heads/||')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version_tag=$BRANCH-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Version: $BRANCH-$SHORT_SHA"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push database
        uses: docker/build-push-action@v6
        with:
          context: ./Database
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USER }}/td1-database:latest
            ${{ secrets.DOCKER_USER }}/td1-database:${{ steps.tags.outputs.version_tag }}

      - name: ❌ Erreur - Build database échoué
        if: failure()
        run: echo "Problème dans le step 'Build and push database'" && exit 1

  build-httpd-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    needs: [test-httpd, sonar-quality-gate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tags
        id: tags
        run: |
          BRANCH=$(echo ${{ github.ref }} | sed 's|refs/heads/||')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version_tag=$BRANCH-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Version: $BRANCH-$SHORT_SHA"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./HTTP_server
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USER }}/td1-httpd:latest
            ${{ secrets.DOCKER_USER }}/td1-httpd:${{ steps.tags.outputs.version_tag }}

      - name: ❌ Erreur - Build httpd échoué
        if: failure()
        run: echo "Problème dans le step 'Build and push httpd'" && exit 1

  test-httpd:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run httpd container
        run: |
          docker run -d --name httpd-test \
            -v ${{ github.workspace }}/HTTP_server/index.html:/usr/local/apache2/htdocs/index.html \
            -v ${{ github.workspace }}/HTTP_server/httpd-test.conf:/usr/local/apache2/conf/httpd.conf \
            -p 8080:80 \
            httpd:2.4-alpine
          sleep 3

      - name: Check if container is running
        run: |
          echo "Checking container status..."
          docker ps | grep httpd-test || (echo "Container not running!" && docker ps -a)
          
          echo "Container logs:"
          docker logs httpd-test || echo "No logs available"
          
          echo "Checking files in container:"
          docker exec httpd-test ls -la /usr/local/apache2/htdocs/ || echo "Cannot access htdocs"

      - name: Wait for httpd to respond
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/ > /dev/null 2>&1; then
              echo "HTTPD is ready!"
              break
            fi
            echo "Waiting for HTTPD... ($i/30)"
            sleep 1
          done

      - name: Verify index.html is served correctly
        run: |
          echo "Testing HTTP response..."
          HTTP_RESPONSE=$(curl -s -v http://localhost:8080/ 2>&1)
          echo "Full response:"
          echo "$HTTP_RESPONSE"
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Expected HTTP 200, got $HTTP_STATUS"
            echo "Container logs:"
            docker logs httpd-test
            exit 1
          fi
          
          echo "✓ HTTP 200 OK received"
          echo "Verifying HTML content..."
          RESPONSE=$(curl -s http://localhost:8080/)
          
          if ! echo "$RESPONSE" | grep -q "Welcome"; then
            echo "❌ 'Welcome' not found in HTML"
            echo "Response was:"
            echo "$RESPONSE"
            exit 1
          fi
          
          if ! echo "$RESPONSE" | grep -q "<!DOCTYPE html>"; then
            echo "❌ '<!DOCTYPE html>' not found in HTML"
            exit 1
          fi
          
          echo "✓ HTML content is valid"

      - name: Check response headers
        run: |
          echo "Checking response headers..."
          curl -I http://localhost:8080/ | grep -i "content-type: text/html" || exit 1
          echo "✓ Content-Type header is correct"

      - name: Cleanup test container
        if: always()
        run: docker stop httpd-test && docker rm httpd-test

      - name: ❌ Erreur - Tests httpd échoués
        if: failure()
        run: echo "Problème dans les tests HTTPD - Vérifiez que le serveur démarre et répond"



  build-frontend-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    needs: [sonar-quality-gate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tags
        id: tags
        run: |
          BRANCH=$(echo ${{ github.ref }} | sed 's|refs/heads/||')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version_tag=$BRANCH-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          build-args: |
            VUE_APP_API_URL=camille.dommergue.takima.school:8070/api
          tags: |
            ${{ secrets.DOCKER_USER }}/td1-frontend:latest
            ${{ secrets.DOCKER_USER }}/td1-frontend:${{ steps.tags.outputs.version_tag }}

  deploy-to-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
    needs: [build-backend-image, build-database-image, build-httpd-image, build-frontend-image]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production  # Demande une approbation manuelle avant le déploiement
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /home/runner/.ssh/deploy_key
          chmod 600 /home/runner/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> /home/runner/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key created successfully"
          ls -la /home/runner/.ssh/
      
      - name: Create .env file from secrets
        run: |
          cat > .env << 'EOF'
          # Database Configuration
          DB_CONTAINER_NAME=${{ secrets.DB_CONTAINER_NAME || 'td1-database' }}
          DB_IMAGE=${{ secrets.DB_IMAGE || 'cdmrg/td1-database' }}
          DB_PORT=${{ secrets.DB_PORT || '5432' }}
          DB_NETWORK=${{ secrets.DB_NETWORK || 'db-network' }}
          DB_USER=${{ secrets.DB_USER || 'admin' }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME || 'myapp' }}
          POSTGRES_USER=${{ secrets.DB_USER || 'admin' }}
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          POSTGRES_DB=${{ secrets.DB_NAME || 'myapp' }}
          
          # Backend API Configuration
          APP_CONTAINER_NAME=${{ secrets.APP_CONTAINER_NAME || 'td1-backend' }}
          APP_IMAGE=${{ secrets.APP_IMAGE || 'cdmrg/td1-backend' }}
          APP_PORT=${{ secrets.APP_PORT || '8080' }}
          APP_NETWORK=${{ secrets.APP_NETWORK || 'api-network' }}
          
          # HTTP Server (Reverse Proxy) Configuration
          PROXY_CONTAINER_NAME=${{ secrets.PROXY_CONTAINER_NAME || 'td1-httpd' }}
          PROXY_IMAGE=${{ secrets.PROXY_IMAGE || 'cdmrg/td1-httpd' }}
          PROXY_PORT=${{ secrets.PROXY_PORT || '8070' }}
          PROXY_NETWORK=${{ secrets.PROXY_NETWORK || 'api-network' }}
          EOF
      
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
      
      - name: Create Ansible inventory
        run: |
          mkdir -p ansible/inventories
          cat > ansible/inventories/setup.yml << 'EOF'
          all:
            vars:
              ansible_user: ${{ secrets.DEPLOY_USER }}
              ansible_ssh_private_key_file: /home/runner/.ssh/deploy_key
            children:
              prod:
                hosts:
                  ${{ secrets.DEPLOY_HOST }}:
          EOF
          cat ansible/inventories/setup.yml
      
      - name: Run Ansible playbook
        run: |
          cd ansible
          ansible-playbook -v -e "ansible_ssh_private_key_file=/home/runner/.ssh/deploy_key" deploy.yml
      
      - name: ✅ Deployment successful
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "======================================"
          echo "Application is now running at:"
          echo "  Database: ${{ secrets.DEPLOY_HOST }}:5432"
          echo "  Backend API: ${{ secrets.DEPLOY_HOST }}:8080"
          echo "  HTTP Server: ${{ secrets.DEPLOY_HOST }}:8070"
          echo "======================================"
      
      - name: ❌ Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs above for details"
          exit 1


