name: CI devops 2026
on:
  push:
    branches: 
      - main
  pull_request:

jobs:
  test-backend: 
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test with Maven
        run: cd Backend_API/simpleapi && mvn -B verify sonar:sonar -Dsonar.projectKey=CamilleDom_3-tier-web-API -Dsonar.organization=camilledom -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}  --file Backend_API/simpleapi/pom.xml


  build-and-push-docker-image:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend API
        uses: docker/build-push-action@v6
        with:
          context: ./Backend_API/simpleapi
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USER }}/td1-backend:latest

      - name: Build and push database
        uses: docker/build-push-action@v6
        with:
          context: ./Database
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USER }}/td1-database:latest

      - name: Build and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./HTTP_server
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKER_USER }}/td1-httpd:latest

