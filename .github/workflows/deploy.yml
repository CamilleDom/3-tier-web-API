name: Deploy with Ansible

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible paramiko

      - name: Create .env file
        run: |
          cat > .env << EOF
          DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER=${{ secrets.DEPLOY_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_CONTAINER_NAME=${{ secrets.DB_CONTAINER_NAME || 'td1-database' }}
          DB_IMAGE=${{ secrets.DB_IMAGE || 'cdmrg/td1-database' }}
          DB_PORT=${{ secrets.DB_PORT || '5432' }}
          DB_NETWORK=${{ secrets.DB_NETWORK || 'db-network' }}
          DB_USER=${{ secrets.DB_USER || 'admin' }}
          DB_NAME=${{ secrets.DB_NAME || 'myapp' }}
          APP_CONTAINER_NAME=${{ secrets.APP_CONTAINER_NAME || 'td1-backend' }}
          APP_IMAGE=${{ secrets.APP_IMAGE || 'cdmrg/td1-backend' }}
          APP_PORT=${{ secrets.APP_PORT || '8080' }}
          PROXY_CONTAINER_NAME=${{ secrets.PROXY_CONTAINER_NAME || 'td1-httpd' }}
          PROXY_IMAGE=${{ secrets.PROXY_IMAGE || 'cdmrg/td1-httpd' }}
          PROXY_PORT=${{ secrets.PROXY_PORT || '8070' }}
          PROXY_NETWORK=${{ secrets.PROXY_NETWORK || 'api-network' }}
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}," \
            -u "${{ secrets.DEPLOY_USER }}" \
            --private-key ~/.ssh/id_rsa \
            -v ansible/deploy.yml
