---
- hosts: all
  become: true
  gather_facts: true

  roles:
    - docker
    - create_network
    - launch_database
    - launch_app
    - launch_proxy

  post_tasks:
    - name: Display deployment summary
      debug:
        msg: |
          ========================================
          Deployment Complete!
          ========================================
          Database: http://camille.dommergue.takima.school:5432
          Backend API: http://camille.dommergue.takima.school:8080
          HTTP Server: http://camille.dommergue.takima.school:8070
          ========================================
