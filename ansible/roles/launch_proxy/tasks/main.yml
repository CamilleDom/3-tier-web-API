---
# tasks file for launch_proxy role

- name: Launch HTTP Server (Reverse Proxy) container
  docker_container:
    name: "{{ proxy_container_name }}"
    image: "{{ proxy_image }}"
    state: started
    restart_policy: always
    networks:
      - name: "{{ proxy_network }}"
    ports:
      - "{{ proxy_port }}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
