---
# tasks file for create_network role

- name: Create db-network
  docker_network:
    name: db-network
    driver: bridge
    ipam_config:
      - subnet: 172.25.1.0/24
    state: present

- name: Create api-network
  docker_network:
    name: api-network
    driver: bridge
    ipam_config:
      - subnet: 172.25.2.0/24
    state: present
