---
# Database variables - loaded from .env in deploy.yml pre_tasks
# These are fallback defaults if .env is not available

db_container_name: td1-database
db_image: cdmrg/td1-database
db_port: 5432
db_network: db-network
db_user: admin
db_password: admin123
db_name: myapp
db_volumes:
  - db_data:/var/lib/postgresql/data
db_env:
  POSTGRES_USER: "{{ db_user }}"
  POSTGRES_PASSWORD: "{{ db_password }}"
  POSTGRES_DB: "{{ db_name }}"
