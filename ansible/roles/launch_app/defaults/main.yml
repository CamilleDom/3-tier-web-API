---
# Backend API variables - loaded from .env in deploy.yml pre_tasks
# These are fallback defaults if .env is not available

app_container_name: td1-backend
app_image: cdmrg/td1-backend
app_port: 8080
db_user: admin
db_password: admin123
db_name: myapp

app_env:
  DB_HOST: database
  POSTGRES_USER: "{{ db_user }}"
  POSTGRES_PASSWORD: "{{ db_password }}"
  POSTGRES_DB: "{{ db_name }}"
