---
# tasks file for launch_app role

- name: Launch Backend API container
  docker_container:
    name: td1-backend
    image: "{{ docker_user }}/td1-backend"
    state: started
    pull: true        # force le pull depuis le registry
    recreate: true 

    restart_policy: always
    networks:
      - name: db-network
      - name: api-network
        aliases:
          - td1-backend
    ports:
      - "8080:8080"
    env:
      POSTGRES_HOST: td1-database
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: "{{ db_name }}"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

- name: Wait for application to be ready
  pause:
    seconds: 15
